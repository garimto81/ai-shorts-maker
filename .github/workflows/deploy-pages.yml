name: 🚀 GitHub Pages 배포

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: 📦 Install dependencies
        run: npm ci
        
      - name: 🏗️ Build Next.js site
        run: |
          echo "Building Next.js site with static export..."
          npm run build
          echo "Build completed. Checking output directory..."
          ls -la out/
        env:
          NODE_ENV: production
          
      - name: 📄 Setup Pages
        uses: actions/configure-pages@v4
        
      - name: ✅ Verify output directory
        run: |
          echo "Verifying output directory exists and has content..."
          if [ ! -d "out" ]; then
            echo "ERROR: out directory does not exist!"
            exit 1
          fi
          if [ ! -f "out/index.html" ]; then
            echo "ERROR: index.html not found in out directory!"
            exit 1
          fi
          echo "✅ Output verification successful"
          
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4